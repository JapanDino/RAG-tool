services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: [ ./backend/.env ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    working_dir: /app/backend
    command: >
      bash -lc "
        bash ../scripts/apply_migrations.sh &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes: [ ".:/app" ]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: [ ./backend/.env ]
    depends_on: [ backend, redis ]
    working_dir: /app/backend
    command: bash -lc "celery -A app.celery_app:celery_app worker -l INFO"
    volumes: [ ".:/app" ]

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on: [ backend ]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    working_dir: /app
    # Bind-mounting the source hides image-installed node_modules; keep node_modules on a named volume.
    volumes:
      - "./frontend:/app"
      - frontend_node_modules:/app/node_modules
    command: >
      sh -lc "
        test -d node_modules || npm install &&
        npm run dev
      "

volumes:
  dbdata:
  frontend_node_modules:
